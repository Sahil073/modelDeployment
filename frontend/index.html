<!DOCTYPE html>
<html>
<head>
    <title>Tumor Detection AI</title>
</head>

<body style="margin:0; font-family: Arial, sans-serif; background: linear-gradient(to right, #eef2f3, #dfe9f3);">

    <div style="display:flex; justify-content:center; align-items:center; height:100vh;">

        <div style="width:400px; background:white; padding:30px; border-radius:12px; box-shadow:0 8px 20px rgba(0,0,0,0.1); text-align:center;">

            <h2 style="margin-bottom:10px; color:#2c3e50;">Brain Tumor Classifier</h2>
            <p style="font-size:14px; color:gray; margin-bottom:20px;">
                Upload MRI scan to detect tumor presence
            </p>

            <!-- Upload Box -->
            <div style="border:2px dashed #3498db; padding:20px; border-radius:10px; margin-bottom:15px;">
                <input type="file" id="imageInput" accept="image/*" onchange="previewImage()" />
                <p style="font-size:12px; color:gray;">Supported: JPG, PNG</p>
            </div>

            <!-- Image Preview -->
            <img id="preview" style="display:none; width:100%; border-radius:10px; margin-bottom:15px;" />

            <!-- Button -->
            <button type="button" onclick="uploadImage()"
                style="background:#3498db; color:white; border:none; padding:10px; border-radius:8px; cursor:pointer; width:100%; font-size:16px;">
                Predict
            </button>

            <!-- Loading -->
            <p id="loading" style="display:none; margin-top:15px; color:#555;">
                Processing image...
            </p>

            <!-- Result -->
            <div id="resultBox"
                style="display:none; margin-top:20px; padding:15px; border-radius:10px; font-weight:bold;">
                <span id="resultText"></span>
            </div>

        </div>

    </div>

    <script>
        function previewImage() {
            const fileInput = document.getElementById("imageInput");
            const file = fileInput.files[0];

            if (file) {
                const preview = document.getElementById("preview");
                preview.src = URL.createObjectURL(file);
                preview.style.display = "block";
            }
        }

        async function uploadImage() {
            console.log("Upload triggered");

            const fileInput = document.getElementById("imageInput");
            const file = fileInput.files[0];

            if (!file) {
                alert("Please select an image");
                return;
            }

            const formData = new FormData();
            formData.append("image", file);

            // UI updates
            document.getElementById("loading").style.display = "block";
            document.getElementById("resultBox").style.display = "none";

            try {
                const response = await fetch("http://localhost:5000/predict", {
                    method: "POST",
                    body: formData
                });

                const data = await response.json();

                const resultBox = document.getElementById("resultBox");
                const resultText = document.getElementById("resultText");

                // Conditional styling
                if (data.prediction.toLowerCase().includes("tumor")) {
                    resultBox.style.background = "#fdecea";
                    resultBox.style.color = "#c0392b";
                } else {
                    resultBox.style.background = "#eafaf1";
                    resultBox.style.color = "#27ae60";
                }

                resultText.innerText = "Prediction: " + data.prediction;
                resultBox.style.display = "block";

            } catch (error) {
                console.error(error);
                alert("Error connecting to backend");
            }

            document.getElementById("loading").style.display = "none";
        }
    </script>

</body>
</html>
